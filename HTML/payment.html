<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/6.14.0/flag-icons.min.css">
    <link rel="stylesheet" href="../CSS/Style-index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .card {
            border-radius: 15px;
        }

        .payment-option {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .payment-option:hover {
            background: #f8f9fa;
        }

        .confirm-btn {
            background: #4CAF50;
            color: white;
            font-size: 22px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            width: 100%;
        }

        .confirm-btn:hover {
            background: #43a047;
        }
    </style>
</head>

<body>
    <div class="header">
        <div id="logo-container"></div>
        <div id="menu-container"></div>
        <div class="infor" id="infor-container"></div>
    </div>
    <div class="container py-5">
        <div class="row g-4">

            <!-- Shipping Address -->
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h4 class="mb-3">Shipping Address</h4>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" value="Ananya Sharma">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" value="221B Baker Street">
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" value="Mumbai">
                        </div>

                        <div class="col-6">
                            <label class="form-label">PIN Code</label>
                            <input type="text" class="form-control" value="400001">
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" value="98765 43210">
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="card p-4 shadow-sm mt-4">
                    <h4>Order Summary</h4>

                    <div class="d-flex justify-content-between">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">$0.00</span>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>Shipping</span>
                        <span id="summary-shipping">$0.00</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fw-bold fs-4">
                        <span>Total</span>
                        <span id="summary-total">$0.00</span>
                    </div>
                </div>
            </div>

            <!-- Payment Method -->
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h4 class="mb-3">Payment Method</h4>

                    <div class="payment-option">
                        <input type="radio" name="payment" value="Cash on Delivery">
                        Cash on Delivery 💵
                    </div>

                    <div class="payment-option">
                        <input type="radio" name="payment" value="Card" checked>
                        Credit / Debit Card 💳
                    </div>

                    <div class="payment-option">
                        <input type="radio" name="payment" value="UPI">
                        UPI 📲
                    </div>

                    <div class="payment-option">
                        <input type="radio" name="payment" value="Wallet">
                        Wallet 👛
                    </div>
                </div>

                <button class="confirm-btn mt-4" onclick="confirmOrder()">
                    Confirm Order 🔒
                </button>
            </div>

        </div>
    </div>
</body>
<script src="../JS/bar.js"></script>
<script src="../JS/payment.js"></script>

</html>
